# ByteFreezer Piper Configuration — Docker-ready defaults
#
# This config ships inside the Docker image. Secrets (S3 credentials,
# control API key) are empty and MUST be supplied via environment variables
# or a volume-mounted config file override.

app:
  name: "piper"
  version: "1.0.0"
  log_level: "info"

server:
  api_port: 8082

# S3 source (raw data from receiver)
s3_source:
  bucket_name: "intake"
  region: "us-east-1"
  poll_interval: "30s"
  access_key: ""
  secret_key: ""
  endpoint: "minio:9000"
  ssl: false
  use_iam_role: false

# S3 destination (processed data for packer)
s3_destination:
  bucket_name: "piper"
  region: "us-east-1"
  access_key: ""
  secret_key: ""
  endpoint: "minio:9000"
  ssl: false
  use_iam_role: false

# S3 GeoIP database
s3_geoip:
  bucket_name: "geoip"
  region: "us-east-1"
  access_key: ""
  secret_key: ""
  endpoint: "minio:9000"
  ssl: false
  use_iam_role: false

# Processing engine — job_timeout_seconds is REQUIRED (zero = instant deadline exceeded)
processing:
  max_concurrent_jobs: 10
  job_timeout_seconds: 600
  retry_attempts: 3
  retry_backoff: "exponential"
  buffer_size: 1000

# Pipeline configuration
pipeline:
  config_refresh_interval: "5m"
  geoip_database_path: "/tmp/geoip"
  geoip_city_database: "GeoLite2-City.mmdb"
  geoip_country_database: "GeoLite2-Country.mmdb"
  enable_geoip: false

# Control Service configuration
control_service:
  enabled: true
  control_url: ""
  api_key: ""
  account_id: ""
  timeout_seconds: 30

# Parser configuration
parsers:
  enabled: false
  load_defaults: true
  settings:
    max_line_length: 65536
    buffer_size: 4096
    parse_timeout_seconds: 30
    max_parse_errors: 100
    grok_patterns_dir: "/opt/grok-patterns"
  auto_tenant_parsers: true
  format_defaults:
    plaintext:
      - type: "parse"
        config:
          auto_select: true
          source_field: "message"
          on_parse_failure: "tag"
          preserve_raw: false
    syslog:
      - type: "parse"
        config:
          parser_name: "syslog-rfc3164"
          source_field: "message"
          on_parse_failure: "tag"
    ndjson:
      - type: "parse"
        config:
          parser_name: "json-logs"
          source_field: "message"
          on_parse_failure: "pass_through"
    json:
      - type: "parse"
        config:
          parser_name: "json-logs"
          source_field: "message"
          on_parse_failure: "pass_through"

# Monitoring
monitoring:
  enabled: false
  metrics_host: "0.0.0.0"
  metrics_port: 9092
  log_level: "info"
  enable_tracing: false

# Dead Letter Queue
dlq:
  enabled: true
  retry_attempts: 4
  retry_interval_seconds: 60
  cleanup_interval_seconds: 3600
  max_age_days: 7

housekeeping:
  enabled: true
  interval_seconds: 300

# Health reporting to control plane
health_reporting:
  enabled: true
  report_interval: 30
  timeout_seconds: 10
  register_on_startup: true

# Error tracking
error_tracking:
  enabled: true

dev: false
