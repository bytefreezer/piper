# ByteFreezer-Piper Configuration

app:
  name: "bytefreezer-piper"
  version: "1.0.0"
  log_level: "debug"

server:
  apiport: 8090

# S3 source configuration (raw data input from bytefreezer-receiver)
s3_source:
  bucket_name: "intake"  # Dedicated intake bucket from bytefreezer-receiver
  region: "us-east-1"
  poll_interval: "30s"
  access_key: "AKIAQNXBAHUKIMJP26P6"
  secret_key: "SECRET_KEY_AKIAQNXBAHUKIMJP26P6"
  endpoint: "192.168.86.125:9000"  # MinIO endpoint (matches receiver config)
  ssl: false
  use_iam_role: false

# S3 destination configuration (processed data output for bytefreezer-packer)
s3_destination:
  bucket_name: "piper"  # Dedicated piper output bucket for bytefreezer-packer
  region: "us-east-1"
  access_key: "AKIAQNXBAHUKIMJP26P6"
  secret_key: "SECRET_KEY_AKIAQNXBAHUKIMJP26P6"
  endpoint: "192.168.86.125:9000"  # MinIO endpoint (matches receiver config)
  ssl: false
  use_iam_role: false

# S3 GeoIP configuration (GeoIP database updates)
s3_geoip:
  bucket_name: "geoip"  # Dedicated GeoIP bucket for database files
  region: "us-east-1"
  access_key: "AKIAQNXBAHUKIMJP26P6"
  secret_key: "SECRET_KEY_AKIAQNXBAHUKIMJP26P6"
  endpoint: "192.168.86.125:9000"  # MinIO endpoint (matches receiver config)
  ssl: false
  use_iam_role: false

# PostgreSQL configuration for state management
postgresql:
  host: "192.168.86.137"
  port: 5432
  database: "bytefreezer"
  username: "bytefreezer"
  password: "bytefreezer123"
  ssl_mode: "disable"
  schema: "public"
  # Connection pool settings (prevents "context deadline exceeded" errors)
  max_open_conns: 25       # Maximum open connections (enough for 10 workers + overhead)
  max_idle_conns: 10       # Maximum idle connections (matches max_concurrent_jobs)
  conn_max_lifetime: "5m"  # Rotate connections every 5 minutes
  conn_max_idle_time: "5m" # Close idle connections after 5 minutes

# Processing engine configuration
processing:
  max_concurrent_jobs: 10
  job_timeout: "10m"  # 10 minutes (was job_timeout_seconds: 600)
  retry_attempts: 3
  retry_backoff: "exponential"
  buffer_size: 1000

# Pipeline configuration
pipeline:
  config_refresh_interval: "5m"
  geoip_database_path: "/tmp/geoip"
  geoip_city_database: "GeoLite2-City.mmdb"
  geoip_country_database: "GeoLite2-Country.mmdb"
  enable_geoip: false

# Control Service configuration (replaces dev mode)
control_service:
  enabled: true
  base_url: "http://192.168.86.103:8082"
  api_key: "966c5b3e-597c-4b2c-96fb-86d2ffc312fe"  # Service API key (GUID format)
  timeout_seconds: 30

# Parser configuration for log parsing (Logstash-style)
parsers:
  # Enable parser system
  enabled: false
  
  # Default parser configurations
  load_defaults: true
  
  # Parser-specific settings
  settings:
    # Maximum line length for parsing (0 = unlimited)
    max_line_length: 65536
    
    # Buffer size for streaming parsing
    buffer_size: 4096

    # Timeout for parser operations
    parse_timeout_seconds: 30
    
    # Error handling
    max_parse_errors: 100
    
    # Grok pattern directories (optional)
    grok_patterns_dir: "/opt/grok-patterns"
    
  # Auto-generated tenant-specific parsers
  auto_tenant_parsers: true
  
  # Default parsing pipeline for different formats
  format_defaults:
    plaintext:
      - type: "parse"
        config:
          auto_select: true
          source_field: "message"
          on_parse_failure: "tag"
          preserve_raw: false
    
    syslog:
      - type: "parse"
        config:
          parser_name: "syslog-rfc3164"
          source_field: "message"
          on_parse_failure: "tag"
    
    ndjson:
      - type: "parse"
        config:
          parser_name: "json-logs"
          source_field: "message"
          on_parse_failure: "pass_through"
    
    json:
      - type: "parse"
        config:
          parser_name: "json-logs"
          source_field: "message"
          on_parse_failure: "pass_through"

# Monitoring and observability
monitoring:
  metrics_port: 9090
  log_level: "info"
  enable_tracing: false
  # tracing_endpoint: ""    # Optional - OpenTelemetry endpoint

# Secrets management
secrets:
  provider: "aws"         # "aws", "env", "file"
  region: "us-east-1"

# Dead Letter Queue configuration
dlq:
  enabled: true
  retry_attempts: 4
  retry_interval_seconds: 60
  cleanup_interval_seconds: 3600
  max_age_days: 7

# Housekeeping configuration
housekeeping:
  enabled: true
  intervalseconds: 300  # 5 minutes

# Health reporting configuration (uses control_service.base_url)
health_reporting:
  enabled: true  # Enable health reporting to control service
  report_interval: 30  # How often to send health reports (seconds)
  timeout_seconds: 10  # HTTP timeout for health requests
  register_on_startup: true  # Register service instance on startup

# Development mode
dev: false  # Disabled - using Control Service instead (see control_service config above)