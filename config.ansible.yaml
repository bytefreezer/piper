# ByteFreezer Piper Configuration — AWX/Ansible deployment
#
# This file contains AWX placeholder values for systemd/Ansible deployments.
# Ansible replaces REPLACE_WITH_AWX_VARIABLE_* at deploy time.
# For Docker deployments, use config.yaml instead.

app:
  name: "bytefreezer-piper"
  version: "1.0.0"
  log_level: "info"

server:
  api_port: 8082

s3_source:
  bucket_name: "bytefreezer-intake"
  region: "us-east-1"
  poll_interval: "30s"
  access_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_access_key"
  secret_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_secret_key"
  endpoint: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_endpoint"
  ssl: false
  use_iam_role: false

s3_destination:
  bucket_name: "bytefreezer-piper"
  region: "us-east-1"
  access_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_access_key"
  secret_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_secret_key"
  endpoint: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_endpoint"
  ssl: false
  use_iam_role: false

s3_geoip:
  bucket_name: "bytefreezer-geoip"
  region: "us-east-1"
  access_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_access_key"
  secret_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_secret_key"
  endpoint: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_s3_endpoint"
  ssl: false
  use_iam_role: false

processing:
  max_concurrent_jobs: 10
  job_timeout_seconds: 600
  retry_attempts: 3
  retry_backoff: "exponential"
  buffer_size: 1000

pipeline:
  config_refresh_interval: "5m"
  geoip_database_path: "/tmp/geoip"
  geoip_city_database: "GeoLite2-City.mmdb"
  geoip_country_database: "GeoLite2-Country.mmdb"
  enable_geoip: false

control_service:
  enabled: true
  control_url: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_control_url"
  api_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_api_key"
  account_id: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_account_id"
  timeout_seconds: 30

parsers:
  enabled: false
  load_defaults: true
  settings:
    max_line_length: 65536
    buffer_size: 4096
    parse_timeout_seconds: 30
    max_parse_errors: 100
    grok_patterns_dir: "/opt/grok-patterns"
  auto_tenant_parsers: true
  format_defaults:
    plaintext:
      - type: "parse"
        config:
          auto_select: true
          source_field: "message"
          on_parse_failure: "tag"
          preserve_raw: false
    syslog:
      - type: "parse"
        config:
          parser_name: "syslog-rfc3164"
          source_field: "message"
          on_parse_failure: "tag"
    ndjson:
      - type: "parse"
        config:
          parser_name: "json-logs"
          source_field: "message"
          on_parse_failure: "pass_through"
    json:
      - type: "parse"
        config:
          parser_name: "json-logs"
          source_field: "message"
          on_parse_failure: "pass_through"

monitoring:
  enabled: true
  metrics_host: "0.0.0.0"
  metrics_port: 9092
  log_level: "info"
  enable_tracing: false

dlq:
  enabled: true
  retry_attempts: 4
  retry_interval_seconds: 60
  cleanup_interval_seconds: 3600
  max_age_days: 7

housekeeping:
  enabled: true
  interval_seconds: 300

health_reporting:
  enabled: true
  report_interval: 30
  timeout_seconds: 10
  register_on_startup: true

error_tracking:
  enabled: true

dev: false
