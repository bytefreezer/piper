---
- name: Install and configure ByteFreezer Piper service
  hosts: all
  become: yes

  pre_tasks:
    - name: Check if service already exists
      ansible.builtin.stat:
        path: "{{ paths.service_path }}"
      register: service_exists

    - name: Fail if service already installed
      fail:
        msg: "ByteFreezer Piper service is already installed. Use remove playbook first."
      when: service_exists.stat.exists

  tasks:
    - name: Check if release exists
      ansible.builtin.uri:
        url: "{{ download.url }}"
        method: HEAD
        status_code: [200, 302]
      register: url_check
      failed_when: false

    - name: Display download information
      debug:
        msg:
          - "Download URL: {{ download.url }}"
          - "URL accessible: {{ url_check.status == 200 or url_check.status == 302 }}"
          - "If download fails, use docker_install.yml instead or wait for release to complete"

    - name: Create temporary directory for download
      ansible.builtin.tempfile:
        state: directory
        suffix: bytefreezer-piper
      register: temp_dir

    - name: Download and extract binary
      ansible.builtin.unarchive:
        src: "{{ download.url }}"
        dest: "{{ temp_dir.path }}"
        remote_src: yes
      register: download_result
      failed_when: download_result.failed
      retries: 3
      delay: 10

    - name: Copy binary to destination
      ansible.builtin.copy:
        src: "{{ temp_dir.path }}/bytefreezer-piper-linux-amd64"
        dest: "{{ paths.binary_path }}"
        owner: root
        group: root
        mode: '0755'
        remote_src: yes

    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ paths.config_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ paths.log_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure cache directory exists
      ansible.builtin.file:
        path: "{{ paths.cache_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure spool directory exists
      ansible.builtin.file:
        path: "{{ paths.spool_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure grok patterns directory exists
      ansible.builtin.file:
        path: "{{ config.parsers.settings.grok_patterns_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Generate configuration file
      ansible.builtin.template:
        src: templates/config.yaml.j2
        dest: "{{ paths.config_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Install logrotate configuration
      ansible.builtin.template:
        src: templates/logrotate.j2
        dest: "{{ paths.logrotate_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Create systemd service file
      ansible.builtin.template:
        src: templates/bytefreezer-piper.service.j2
        dest: "{{ paths.service_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Check PostgreSQL connection
      ansible.builtin.shell: |
        PGPASSWORD="{{ config.postgresql.password }}" psql -h "{{ config.postgresql.host }}" -p "{{ config.postgresql.port }}" -U "{{ config.postgresql.username }}" -d "{{ config.postgresql.database }}" -c "SELECT 1;" > /dev/null 2>&1
      register: postgres_check
      ignore_errors: yes
      changed_when: false

    - name: Display PostgreSQL connection status
      debug:
        msg:
          - "PostgreSQL connection: {{ 'SUCCESS' if postgres_check.rc == 0 else 'FAILED' }}"
          - "Host: {{ config.postgresql.host }}:{{ config.postgresql.port }}"
          - "Database: {{ config.postgresql.database }}"
          - "User: {{ config.postgresql.username }}"
          - "Note: Service will start even if PostgreSQL is not available, but will fail to process files"

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service.name }}"
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ temp_dir.path }}"
        state: absent

  post_tasks:
    - name: Display installation status
      debug:
        msg:
          - "ByteFreezer Piper installation completed!"
          - "Binary: {{ paths.binary_path }}"
          - "Config: {{ paths.config_path }}"
          - "Logs: {{ paths.log_dir }}"
          - "Cache: {{ paths.cache_dir }}"
          - "Spool: {{ paths.spool_dir }}"
          - "Service: systemctl status {{ service.name }}"
          - ""
          - "Configuration Notes:"
          - "- PostgreSQL must be running and accessible"
          - "- Control service endpoint: {{ config.pipeline.controller_endpoint }}"
          - "- S3 source bucket: {{ config.s3_source.bucket_name }}/{{ config.s3_source.prefix }}"
          - "- S3 destination bucket: {{ config.s3_destination.bucket_name }}/{{ config.s3_destination.prefix }}"
          - "- Metrics endpoint: http://{{ ansible_default_ipv4.address }}:{{ config.monitoring.metrics_port }}/metrics"
          - "- Health endpoint: http://{{ ansible_default_ipv4.address }}:{{ config.monitoring.health_port }}/health"