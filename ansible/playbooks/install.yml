---
- name: Install and configure ByteFreezer Piper service
  hosts: all
  become: yes

  pre_tasks:
    - name: Check if service already exists
      ansible.builtin.stat:
        path: "{{ paths.service_path }}"
      register: service_exists

    - name: Fail if service already installed
      fail:
        msg: "ByteFreezer Piper service is already installed. Use remove playbook first or set force_reinstall=true."
      when: service_exists.stat.exists and not force_reinstall

  tasks:
    - name: Check if release exists
      ansible.builtin.uri:
        url: "{{ download.url }}"
        method: HEAD
        status_code: [200, 302]
      register: url_check
      failed_when: false

    - name: Display download information
      debug:
        msg:
          - "Download URL: {{ download.url }}"
          - "URL accessible: {{ url_check.status == 200 or url_check.status == 302 }}"
          - "If download fails, use docker_install.yml instead or wait for release to complete"

    - name: Create temporary directory for download
      ansible.builtin.tempfile:
        state: directory
        suffix: bytefreezer-piper
      register: temp_dir

    - name: Download and extract binary
      ansible.builtin.unarchive:
        src: "{{ download.url }}"
        dest: "{{ temp_dir.path }}"
        remote_src: yes
      register: download_result
      failed_when: download_result.failed
      retries: 3
      delay: 10

    - name: Copy binary to destination
      ansible.builtin.copy:
        src: "{{ temp_dir.path }}/bytefreezer-piper-linux-amd64"
        dest: "{{ paths.binary_path }}"
        owner: root
        group: root
        mode: '0755'
        remote_src: yes

    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ paths.config_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ paths.log_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure cache directory exists
      ansible.builtin.file:
        path: "{{ paths.cache_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure spool directory exists
      ansible.builtin.file:
        path: "{{ paths.spool_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure grok patterns directory exists
      ansible.builtin.file:
        path: "{{ config.parsers.settings.grok_patterns_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Generate configuration file
      ansible.builtin.template:
        src: templates/config.yaml.j2
        dest: "{{ paths.config_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Install logrotate configuration
      ansible.builtin.template:
        src: templates/logrotate.j2
        dest: "{{ paths.logrotate_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Test PostgreSQL connectivity
      ansible.builtin.wait_for:
        host: "{{ config.postgresql.host }}"
        port: "{{ config.postgresql.port }}"
        timeout: 10
      register: pg_connectivity
      failed_when: false

    - name: Display PostgreSQL connectivity status
      debug:
        msg:
          - "PostgreSQL connectivity: {{ 'SUCCESS' if pg_connectivity.failed == false else 'FAILED' }}"
          - "Host: {{ config.postgresql.host }}:{{ config.postgresql.port }}"
          - "Database: {{ config.postgresql.database }}"
          - "{{ 'PostgreSQL is accessible' if pg_connectivity.failed == false else 'WARNING: PostgreSQL is not accessible. Service may fail to start.' }}"

    - name: Create systemd service file
      ansible.builtin.template:
        src: templates/bytefreezer-piper.service.j2
        dest: "{{ paths.service_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable service
      ansible.builtin.systemd:
        name: "{{ service.name }}"
        enabled: yes

    - name: Start service
      ansible.builtin.systemd:
        name: "{{ service.name }}"
        state: started
      register: service_start
      failed_when: false

    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ service.name }}"
      register: service_status

    - name: Display service status
      debug:
        msg:
          - "Service start result: {{ 'SUCCESS' if service_start.failed == false else 'FAILED' }}"
          - "Service state: {{ service_status.status.ActiveState }}"
          - "Service enabled: {{ service_status.status.UnitFileState }}"
          - "{{ 'Service started successfully' if service_start.failed == false else 'Service failed to start. Check logs with: journalctl -u ' + service.name }}"

    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ temp_dir.path }}"
        state: absent

  post_tasks:
    - name: Display installation status
      debug:
        msg:
          - "ByteFreezer Piper installation completed!"
          - "Binary: {{ paths.binary_path }}"
          - "Config: {{ paths.config_path }}"
          - "Logs: {{ paths.log_dir }}"
          - "Cache: {{ paths.cache_dir }}"
          - "Spool: {{ paths.spool_dir }}"
          - "Service: systemctl status {{ service.name }}"
          - ""
          - "Configuration Notes:"
          - "- PostgreSQL: {{ config.postgresql.host }}:{{ config.postgresql.port }}/{{ config.postgresql.database }}"
          - "- Control service: {{ config.pipeline.controller_endpoint }}"
          - "- S3 source: {{ config.s3_source.bucket_name }}"
          - "- S3 destination: {{ config.s3_destination.bucket_name }}"
          - "- Metrics: http://{{ ansible_default_ipv4.address }}:{{ config.monitoring.metrics_port }}/metrics"
          - "- API: http://{{ ansible_default_ipv4.address }}:{{ config.server.api_port }}/api/v1/status"
          - ""
          - "Troubleshooting:"
          - "- Check service logs: journalctl -u {{ service.name }} -f"
          - "- Check service status: systemctl status {{ service.name }}"
          - "- Test PostgreSQL: nc -zv {{ config.postgresql.host }} {{ config.postgresql.port }}"
          - "- If PostgreSQL is not installed, run: ansible-playbook postgresql_install.yml"