---
- name: Install and configure ByteFreezer Piper service (Managed)
  hosts: all
  become: yes
  vars_files:
    - vars/managed.yml

  pre_tasks:
    - name: Check if service already exists
      ansible.builtin.stat:
        path: "{{ paths.service_path }}"
      register: service_exists

    # Always clean up existing installation before reinstalling
    - name: Stop and disable existing service
      ansible.builtin.shell: |
        sudo systemctl stop {{ service.name }} || true
        sudo systemctl disable {{ service.name }} || true
        timeout 30 sudo systemctl daemon-reload || echo "daemon-reload completed or timed out"
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing systemd service file
      ansible.builtin.shell: |
        sudo rm -f "{{ paths.service_path }}"
        timeout 30 sudo systemctl daemon-reload || echo "daemon-reload completed or timed out"
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing logrotate configuration
      ansible.builtin.shell: |
        sudo rm -f "{{ paths.logrotate_path }}"
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing binary
      ansible.builtin.shell: |
        sudo rm -f "{{ paths.binary_path }}"
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing configuration directory
      ansible.builtin.shell: |
        sudo rm -rf "{{ paths.config_dir }}"
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing log directory
      ansible.builtin.shell: |
        sudo rm -rf "{{ paths.log_dir }}"
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing cache directory
      ansible.builtin.shell: |
        sudo rm -rf "{{ paths.cache_dir }}"
      when: service_exists.stat.exists
      ignore_errors: yes

  tasks:

    - name: Copy binary to destination
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/dist/bytefreezer-piper"
        dest: "{{ paths.binary_path }}"
        owner: root
        group: root
        mode: '0755'

    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ paths.config_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ paths.log_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure cache directory exists
      ansible.builtin.file:
        path: "{{ paths.cache_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure spool directory exists
      ansible.builtin.file:
        path: "{{ paths.spool_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure grok patterns directory exists
      ansible.builtin.file:
        path: "{{ config.parsers.settings.grok_patterns_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure GeoIP database directory exists
      ansible.builtin.file:
        path: "{{ config.pipeline.geoip_database_path }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: config.pipeline.enable_geoip | default(false) | bool

    - name: Generate configuration file
      ansible.builtin.template:
        src: templates/config.yaml.j2
        dest: "{{ paths.config_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Install logrotate configuration
      ansible.builtin.template:
        src: templates/logrotate.j2
        dest: "{{ paths.logrotate_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Create systemd service file
      ansible.builtin.template:
        src: templates/bytefreezer-piper.service.j2
        dest: "{{ paths.service_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service.name }}"
        enabled: yes
        state: started
        daemon_reload: yes

  post_tasks:
    - name: Display installation status
      debug:
        msg:
          - "ByteFreezer Piper installation completed!"
          - "Binary: {{ paths.binary_path }}"
          - "Config: {{ paths.config_path }}"
          - "Logs: {{ paths.log_dir }}"
          - "Cache: {{ paths.cache_dir }}"
          - "Spool: {{ paths.spool_dir }}"
          - "Installation method: Local binary copy"
          - "Service: systemctl status {{ service.name }}"
          - ""
          - "Configuration Notes:"
          - "- Control service endpoint: {{ config.control_service.base_url }}"
          - "- S3 source bucket: {{ config.s3_source.bucket_name }}"
          - "- S3 destination bucket: {{ config.s3_destination.bucket_name }}"
          - "- Metrics endpoint: http://{{ ansible_default_ipv4.address }}:{{ config.monitoring.metrics_port }}/metrics"
          - "- API endpoint: http://{{ ansible_default_ipv4.address }}:{{ config.server.api_port }}/api/v1/status"