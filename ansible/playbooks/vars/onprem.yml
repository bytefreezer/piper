---
# ByteFreezer Piper - On-Premises Deployment (Self-Contained Variables)
# On-prem deployment on tp1 (192.168.86.101)
# This file contains ALL variables needed for on-prem deployment

# GitHub repository
github_repo: "bytefreezer/piper"
version: "{{ bytefreezer_piper_version | default('latest') }}"

# Service configuration
service:
  name: "bytefreezer-piper"
  user: "root"
  group: "root"

# File paths
paths:
  binary_dir: "/usr/local/bin"
  binary_path: "/usr/local/bin/bytefreezer-piper"
  config_dir: "/etc/bytefreezer-piper"
  config_path: "/etc/bytefreezer-piper/config.yaml"
  log_dir: "/var/log/bytefreezer-piper"
  cache_dir: "/var/cache/bytefreezer-piper"
  spool_dir: "/var/spool/bytefreezer-piper"
  service_path: "/etc/systemd/system/bytefreezer-piper.service"
  logrotate_path: "/etc/logrotate.d/bytefreezer-piper"

# Log rotation settings
logrotate:
  # Logs rotate when reaching 100MB OR daily, whichever comes first
  # Total logs limited to ~1GB (rotate_count * size + current file)
  rotate_count: 7
  size: "100M"
  maxsize: "1G"

# Application configuration
config:
  app:
    name: "bytefreezer-piper"
    version: "1.0.0"
    log_level: "info"
    deployment_type: "on_prem"

  server:
    api_port: 8082

  # S3 source configuration (raw data input from bytefreezer-receiver)
  # Credentials come from AWX variables: bytefreezer_s3_endpoint, bytefreezer_s3_access_key, bytefreezer_s3_secret_key
  s3_source:
    bucket_name: "intake-onprem"
    region: "us-east-1"
    poll_interval: "30s"
    ssl: false
    use_iam_role: false

  # S3 destination configuration (processed data output for bytefreezer-packer)
  # Credentials come from AWX variables: bytefreezer_s3_endpoint, bytefreezer_s3_access_key, bytefreezer_s3_secret_key
  s3_destination:
    bucket_name: "piper-onprem"
    region: "us-east-1"
    ssl: false
    use_iam_role: false

  # S3 GeoIP configuration (GeoIP database updates)
  # Credentials come from AWX variables: bytefreezer_s3_endpoint, bytefreezer_s3_access_key, bytefreezer_s3_secret_key
  s3_geoip:
    bucket_name: "geoip"
    region: "us-east-1"
    ssl: false
    use_iam_role: false

  # Processing engine configuration
  processing:
    max_concurrent_jobs: 10
    job_timeout_seconds: 600
    retry_attempts: 3
    retry_backoff: "exponential"
    buffer_size: 1000

  # Pipeline configuration
  pipeline:
    controller_endpoint: ""
    config_refresh_interval: "5m"
    geoip_database_path: "/opt/geoip"
    geoip_city_database: "GeoLite2-City.mmdb"
    geoip_country_database: "GeoLite2-Country.mmdb"
    enable_geoip: false

  # Control Service configuration - On-prem deployment (process only on-prem account)
  # control_url comes from AWX variable: bytefreezer_control_url
  control_service:
    enabled: true
    # api_key comes from AWX variable: bytefreezer_api_key
    timeout_seconds: 30
    account_id: "s2jeovtia7zn"  # On-prem account - only process this account
    tenant_id: ""                # Empty = process all tenants in this account

  # Parser configuration for log parsing (Logstash-style)
  parsers:
    enabled: false
    load_defaults: true
    settings:
      max_line_length: 65536
      buffer_size: 4096
      parse_timeout_seconds: 30
      max_parse_errors: 100
      grok_patterns_dir: "/opt/grok-patterns"
    auto_tenant_parsers: true
    format_defaults:
      plaintext:
        - type: "parse"
          config:
            auto_select: true
            source_field: "message"
            on_parse_failure: "tag"
            preserve_raw: false
      syslog:
        - type: "parse"
          config:
            parser_name: "syslog-rfc3164"
            source_field: "message"
            on_parse_failure: "tag"
      ndjson:
        - type: "parse"
          config:
            parser_name: "json-logs"
            source_field: "message"
            on_parse_failure: "pass_through"
      json:
        - type: "parse"
          config:
            parser_name: "json-logs"
            source_field: "message"
            on_parse_failure: "pass_through"

  # Monitoring and observability
  monitoring:
    metrics_port: 9092
    log_level: "info"
    enable_tracing: false

  # Housekeeping configuration
  housekeeping:
    enabled: true
    intervalseconds: 300

  soc:
    enabled: false

  # Development mode
  dev: false

  # Health reporting configuration
  health_reporting:
    enabled: true
    report_interval: 30
    timeout_seconds: 10
    register_on_startup: true

  # Error tracking configuration
  error_tracking:
    enabled: true

# Download configuration
download:
  url: "https://github.com/{{ github_repo }}/releases/{{ 'latest/download' if version == 'latest' else 'download/' + version }}/bytefreezer-piper-linux-amd64.tar.gz"

# Docker image configuration
docker:
  image_name: "ghcr.io/bytefreezer/piper"
  tag: "{{ bytefreezer_piper_version | default('latest') }}"
  force_pull: false

# Remove configuration
remove:
  cache_dir: "{{ bytefreezer_piper_remove_cache_dir | default(false) }}"
  spool_dir: "{{ bytefreezer_piper_remove_spool_dir | default(false) }}"

# AWX Survey Variables
skip_validation: "{{ skip_validation | default(false) }}"
enable_debug_logging: "{{ enable_debug_logging | default(false) }}"
