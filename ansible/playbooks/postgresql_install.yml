---
- name: Install and configure PostgreSQL for ByteFreezer Piper
  hosts: all
  become: yes
  vars:
    postgresql_version: "14"

  tasks:
    - name: Install PostgreSQL packages (Debian/Ubuntu)
      ansible.builtin.package:
        name:
          - postgresql-{{ postgresql_version }}
          - postgresql-contrib-{{ postgresql_version }}
          - python3-psycopg2
        state: present
      when: ansible_os_family == "Debian"

    - name: Install PostgreSQL packages (RedHat/CentOS)
      ansible.builtin.package:
        name:
          - postgresql{{ postgresql_version }}-server
          - postgresql{{ postgresql_version }}-contrib
          - python3-psycopg2
        state: present
      when: ansible_os_family == "RedHat"

    - name: Initialize PostgreSQL database (RedHat/CentOS)
      ansible.builtin.command:
        cmd: /usr/pgsql-{{ postgresql_version }}/bin/postgresql-{{ postgresql_version }}-setup initdb
        creates: /var/lib/pgsql/{{ postgresql_version }}/data/postgresql.conf
      when: ansible_os_family == "RedHat"

    - name: Start and enable PostgreSQL service
      ansible.builtin.systemd:
        name: "{{ 'postgresql' if ansible_os_family == 'Debian' else 'postgresql-' + postgresql_version }}"
        state: started
        enabled: yes

    - name: Create bytefreezer database user
      community.postgresql.postgresql_user:
        name: "{{ config.postgresql.username }}"
        password: "{{ config.postgresql.password }}"
        role_attr_flags: CREATEDB,NOSUPERUSER
        state: present
      become_user: postgres

    - name: Create bytefreezer database
      community.postgresql.postgresql_db:
        name: "{{ config.postgresql.database }}"
        owner: "{{ config.postgresql.username }}"
        state: present
      become_user: postgres

    - name: Configure PostgreSQL to listen on all addresses
      ansible.builtin.lineinfile:
        path: "{{ '/etc/postgresql/' + postgresql_version + '/main/postgresql.conf' if ansible_os_family == 'Debian' else '/var/lib/pgsql/' + postgresql_version + '/data/postgresql.conf' }}"
        line: "listen_addresses = '*'"
        regexp: "^#?listen_addresses"
        backup: yes
      notify: restart postgresql

    - name: Configure PostgreSQL authentication for bytefreezer user
      ansible.builtin.lineinfile:
        path: "{{ '/etc/postgresql/' + postgresql_version + '/main/pg_hba.conf' if ansible_os_family == 'Debian' else '/var/lib/pgsql/' + postgresql_version + '/data/pg_hba.conf' }}"
        line: "host    {{ config.postgresql.database }}    {{ config.postgresql.username }}    0.0.0.0/0    md5"
        insertafter: "^# TYPE  DATABASE        USER            ADDRESS                 METHOD"
        backup: yes
      notify: restart postgresql

    - name: Test PostgreSQL connection
      community.postgresql.postgresql_query:
        db: "{{ config.postgresql.database }}"
        login_user: "{{ config.postgresql.username }}"
        login_password: "{{ config.postgresql.password }}"
        login_host: localhost
        query: "SELECT version();"
      register: pg_version

    - name: Display PostgreSQL information
      debug:
        msg:
          - "PostgreSQL installation completed!"
          - "Version: {{ pg_version.query_result[0].version }}"
          - "Database: {{ config.postgresql.database }}"
          - "User: {{ config.postgresql.username }}"
          - "Connection: {{ config.postgresql.host }}:{{ config.postgresql.port }}"
          - ""
          - "Next steps:"
          - "1. Update group_vars/all.yml with the correct PostgreSQL host IP"
          - "2. Run the main install playbook: ansible-playbook install.yml"

  handlers:
    - name: restart postgresql
      ansible.builtin.systemd:
        name: "{{ 'postgresql' if ansible_os_family == 'Debian' else 'postgresql-' + postgresql_version }}"
        state: restarted