---
# ByteFreezer Piper - Centralized Variables Configuration

# GitHub repository
github_repo: "n0needt0/bytefreezer-piper"
version: "{{ bytefreezer_piper_version | default('latest') }}"

# Service configuration
service:
  name: "bytefreezer-piper"
  user: "root"
  group: "root"

# File paths
paths:
  binary_dir: "/usr/local/bin"
  binary_path: "/usr/local/bin/bytefreezer-piper"
  config_dir: "/etc/bytefreezer-piper"
  config_path: "/etc/bytefreezer-piper/config.yaml"
  log_dir: "/var/log/bytefreezer-piper"
  cache_dir: "/var/cache/bytefreezer-piper"
  spool_dir: "/var/spool/bytefreezer-piper"
  service_path: "/etc/systemd/system/bytefreezer-piper.service"
  logrotate_path: "/etc/logrotate.d/bytefreezer-piper"

# Log rotation settings
logrotate:
  rotate_count: 7

# Application configuration
config:
  app:
    name: "bytefreezer-piper"
    version: "1.0.0"
    log_level: "info"

  server:
    apiport: 8090

  # S3 source configuration (raw data input from bytefreezer-receiver)
  s3_source:
    bucket_name: "intake"
    region: "us-east-1"
    poll_interval: "30s"
    endpoint: "192.168.86.125:9000"
    ssl: false
    access_key: "AKIAQNXBAHUKIMJP26P6"
    secret_key: "SECRET_KEY_AKIAQNXBAHUKIMJP26P6"

  # S3 destination configuration (processed data output for bytefreezer-packer)
  s3_destination:
    bucket_name: "piper"
    region: "us-east-1"
    endpoint: "192.168.86.125:9000"
    ssl: false
    access_key: "AKIAQNXBAHUKIMJP26P6"
    secret_key: "SECRET_KEY_AKIAQNXBAHUKIMJP26P6"

  # PostgreSQL configuration for state management
  postgresql:
    host: "192.168.86.137"
    port: 5432
    database: "bytefreezer"
    username: "bytefreezer"
    password: "bytefreezer123"
    ssl_mode: "disable"
    schema: "public"

  # Processing engine configuration
  processing:
    max_concurrent_jobs: 10
    job_timeout: "10m"
    retry_attempts: 3
    retry_backoff: "exponential"
    buffer_size: 1000

  # Pipeline configuration
  pipeline:
    controller_endpoint: "http://bytefreezer-control:8080"
    config_refresh_interval: "5m"
    geoip_database_path: "/opt/geoip"
    geoip_city_database: "GeoLite2-City.mmdb"
    geoip_country_database: "GeoLite2-Country.mmdb"

  # Parser configuration for log parsing (Logstash-style)
  parsers:
    enabled: true
    load_defaults: true
    settings:
      max_line_length: 65536
      buffer_size: 4096
      parse_timeout: "30s"
      max_parse_errors: 100
      grok_patterns_dir: "/opt/grok-patterns"
    auto_tenant_parsers: true
    format_defaults:
      plaintext:
        - type: "parse"
          config:
            auto_select: true
            source_field: "message"
            on_parse_failure: "tag"
            preserve_raw: false
      syslog:
        - type: "parse"
          config:
            parser_name: "syslog-rfc3164"
            source_field: "message"
            on_parse_failure: "tag"
      ndjson:
        - type: "parse"
          config:
            parser_name: "json-logs"
            source_field: "message"
            on_parse_failure: "pass_through"
      json:
        - type: "parse"
          config:
            parser_name: "json-logs"
            source_field: "message"
            on_parse_failure: "pass_through"

  # Monitoring and observability
  monitoring:
    metrics_port: 9090
    log_level: "info"
    enable_tracing: false

  # Secrets management
  secrets:
    provider: "aws"
    region: "us-east-1"

  # Housekeeping configuration
  housekeeping:
    enabled: true
    intervalseconds: 600  # 10 minutes

  soc:
    enabled: false

  # Development mode (set to true for dev environment)
  dev: true

# Download configuration
download:
  url: "https://github.com/{{ github_repo }}/releases/{{ 'latest/download' if version == 'latest' else 'download/' + version }}/bytefreezer-piper-linux-amd64.tar.gz"

# Docker image configuration for docker_install.yml
docker:
  image_name: "ghcr.io/n0needt0/bytefreezer-piper"
  tag: "{{ bytefreezer_piper_version | default('latest') }}"
  force_pull: false  # Set to true to always pull latest image

# Remove configuration
remove:
  cache_dir: "{{ bytefreezer_piper_remove_cache_dir | default(false) }}"
  spool_dir: "{{ bytefreezer_piper_remove_spool_dir | default(false) }}"